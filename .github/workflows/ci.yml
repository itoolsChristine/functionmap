name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run extraction tests
        run: python -m unittest tests.test_extraction -v

      - name: Run sync tests
        run: python -m unittest tests.test_sync -v

      - name: Run MCP tests
        run: |
          pip install "mcp>=1.20,<2.0" --quiet
          python -m unittest tests.test_mcp -v

      - name: Run MCP fixture tests
        run: python -m unittest tests.test_mcp_fixture -v

      - name: Run parity tests
        run: python -m unittest tests.test_parity -v
